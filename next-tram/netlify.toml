[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Netlify Functions for the API (optional — see README for separate backend)
# [functions]
#   directory = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to   = "https://dbtt-u8we.onrender.com/api/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
